{% extends "base.html" %}
{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h3 mb-1">Dashboard</h1>
      <div class="text-secondary">Read-only viewer for the Git-backed worklog.</div>
    </div>
    <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('health') }}">Health</a>
  </div>
  <div class="row g-3">
    {% for card in cards %}
      <div class="col-12 col-xl-6">
        <div class="card card-shadow h-100">
          <div class="card-header bg-white fw-semibold">{{ card.title }}</div>
          <div class="card-body doc-body">
            {{ card.html | safe }}
            <div class="mt-3"><a href="{{ url_for('view_file', relative_path=card.path) }}">Open source</a></div>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
