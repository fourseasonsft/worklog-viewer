<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title if title else "FSFT Worklog Viewer" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: #f5f7fb; }
      .sidebar { min-height: 100vh; background: #0f172a; }
      .sidebar a { color: #cbd5e1; text-decoration: none; }
      .sidebar a.active, .sidebar a:hover { color: #fff; }
      .card-shadow { box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
      .dashboard-hero {
        background: linear-gradient(135deg, #ffffff 0%, #eef4ff 100%);
      }
      .summary-card {
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      .summary-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
      }
      .section-card {
        border-left: 4px solid #cbd5e1;
      }
      .section-card-focus {
        border-left-color: #2563eb;
      }
      .doc-body h1, .doc-body h2, .doc-body h3 { margin-top: 1.25rem; }
      .doc-body pre { background: #0b1220; color: #e2e8f0; padding: 1rem; border-radius: .5rem; }
      .doc-body code { background: rgba(15, 23, 42, 0.08); padding: .15rem .35rem; border-radius: .25rem; }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <aside class="col-12 col-md-3 col-xl-2 sidebar p-3">
          <div class="text-white fw-semibold mb-3">FSFT Worklog</div>
          <div class="small text-secondary mb-3">Content root: {{ content_root }}</div>
          <nav class="nav flex-column gap-1">
            {% for item in nav_items %}
              {% set view_args = request.view_args or {} %}
              {% set item_args = item.get('args', {}) %}
              <a class="px-2 py-1 rounded {% if request.endpoint == item.endpoint and (not item.category or view_args.get('category') == item.category) and (not item_args or item_args == view_args) %}active bg-dark{% endif %}" href="{% if item.endpoint == 'category_view' %}{{ url_for(item.endpoint, category=item.category) }}{% elif item_args %}{{ url_for(item.endpoint, **item_args) }}{% else %}{{ url_for(item.endpoint) }}{% endif %}">{{ item.label }}</a>
            {% endfor %}
          </nav>
        </aside>
        <main class="col-12 col-md-9 col-xl-10 p-4">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </body>
</html>
