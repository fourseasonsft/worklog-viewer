<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title if title else "FSFT Worklog Viewer" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 30%),
          radial-gradient(circle at top right, rgba(15, 23, 42, 0.10), transparent 22%),
          #f5f7fb;
      }
      .sidebar { min-height: 100vh; background: #0f172a; }
      .sidebar a { color: #cbd5e1; text-decoration: none; }
      .sidebar a.active, .sidebar a:hover { color: #fff; }
      .card-shadow { box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
      .dashboard-hero { background: linear-gradient(135deg, #ffffff 0%, #eef4ff 100%); }
      .section-card {
        border-left: 4px solid #cbd5e1;
      }
      .section-card-focus {
        border-left-color: #2563eb;
      }
      .doc-body h1, .doc-body h2, .doc-body h3 { margin-top: 1.25rem; }
      .doc-body pre { background: #0b1220; color: #e2e8f0; padding: 1rem; border-radius: .5rem; }
      .doc-body code { background: rgba(15, 23, 42, 0.08); padding: .15rem .35rem; border-radius: .25rem; }
      .worklog-shell { max-width: 1440px; margin: 0 auto; }
      .hero-copy { max-width: 760px; }
      .focus-statement { font-size: clamp(1.65rem, 2vw, 2.4rem); line-height: 1.08; font-weight: 700; letter-spacing: -0.03em; color: #0f172a; }
      .date-chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 0.55rem 0.9rem;
        background: #0f172a;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .capture-card { background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%); }
      .capture-box {
        min-height: 180px;
        font-size: 1.15rem;
        border-radius: 1rem;
        border: 1px solid #cbd5e1;
      }
      .priority-card, .triage-card, .app-card, .focus-item {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        padding: 1rem;
      }
      .focus-item + .focus-item, .app-card + .app-card { margin-top: 0.75rem; }
      .focus-item-kind {
        text-transform: uppercase;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        color: #64748b;
        margin-bottom: 0.25rem;
        font-weight: 700;
      }
      .blocker-item { border-color: #fecaca; background: #fffafa; }
      .secondary-nav { position: sticky; top: 0.75rem; z-index: 5; backdrop-filter: blur(6px); }
      .eyebrow, .section-label { letter-spacing: 0.08em; }
      .quick-capture-form .btn-primary { box-shadow: 0 14px 24px rgba(37, 99, 235, 0.22); }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <aside class="col-12 col-md-3 col-xl-2 sidebar p-3">
          <div class="text-white fw-semibold mb-3">FSFT Worklog</div>
          <div class="small text-secondary mb-3">Content root: {{ content_root }}</div>
          <nav class="nav flex-column gap-1">
            {% for item in nav_items %}
              {% set view_args = request.view_args or {} %}
              {% set item_args = item.get('args', {}) %}
              <a class="px-2 py-1 rounded {% if request.endpoint == item.endpoint and (not item.category or view_args.get('category') == item.category) and (not item_args or item_args == view_args) %}active bg-dark{% endif %}" href="{% if item.endpoint == 'category_view' %}{{ url_for(item.endpoint, category=item.category) }}{% elif item_args %}{{ url_for(item.endpoint, **item_args) }}{% else %}{{ url_for(item.endpoint) }}{% endif %}">{{ item.label }}</a>
            {% endfor %}
          </nav>
        </aside>
        <main class="col-12 col-md-9 col-xl-10 p-4">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>
  </body>
</html>
