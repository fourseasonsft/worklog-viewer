{% extends "base.html" %}
{% block content %}
  <h1 class="h3 mb-3">{{ title }}</h1>
  <div class="row g-3">
    {% for section in sections %}
      <div class="col-12">
        <div class="card card-shadow">
          <div class="card-header bg-white fw-semibold">{{ section.title }}</div>
          <div class="card-body doc-body">
            {{ section.html | safe }}
            <div class="mt-3"><a href="{{ url_for('view_file', relative_path=section.path) }}">Open source</a></div>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
